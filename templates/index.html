{% extends "base.html" %}

{% block content %}
<div class="chat-wrapper">
    <div class="chat-header">
        <div>
            <h2>💙 EchoCare Session</h2>
            <p class="persona-badge">Your Companion: <strong>{{ current_user.username }}'s Profile</strong></p>
        </div>
        <button id="history-btn" class="btn-secondary">📜 History</button>
    </div>

    <div class="chat-box" id="chat-box">
        <div class="message bot-message">
            <div class="bubble">
                Hello! I'm here to listen without judgment. How are you feeling today?
            </div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type your thoughts here..." autocomplete="off">
        <button id="send-btn" class="btn-primary">Send</button>
    </div>
</div>

<!-- Crisis Modal (Hidden by default) -->
<div id="crisis-modal" class="modal" style="display:none;">
    <div class="modal-content">
        <h3>💙 We care about your safety</h3>
        <p id="crisis-message"></p>
        <button onclick="document.getElementById('crisis-modal').style.display='none'" class="btn-primary">I Understand</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    function appendMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `message ${sender}-message`;
        div.innerHTML = `<div class="bubble">${text}</div>`;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
        const message = userInput.value.trim();
        if (!message) return;

        appendMessage(message, 'user');
        userInput.value = '';

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });
            const data = await response.json();

            if (data.is_crisis) {
                document.getElementById('crisis-message').innerText = data.bot_response;
                document.getElementById('crisis-modal').style.display = 'block';
            } else {
                appendMessage(data.bot_response, 'bot');
            }
        } catch (error) {
            appendMessage("Error connecting to EchoCare. Please try again.", 'bot');
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>
{% endblock %}
