{% extends "base.html" %}

{% block content %}
<div class="main-wrapper">
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <button class="history-toggle-btn" onclick="toggleHistoryModal()">
                📜 Chat History
            </button>
            
            <div class="floating-heart">💙</div>
            <h2 class="welcome-text">Welcome to EchoCare!</h2>
        </div>

        <!-- Chat Area -->
        <div class="chat-container">
            <div class="chat-header">
                <h2>💙 EchoCare</h2>
            </div>
            
            <div id="chat-box">
                <div class="bot-message">🤖 Hello! I'm here to listen. How are you feeling today?</div>
            </div>
            
            <div class="input-container">
                <input type="text" id="user-input" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>
</div>

<!-- History Modal Popup -->
<div id="history-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>📜 Chat History</h3>
            <button class="close-btn" onclick="toggleHistoryModal()">×</button>
        </div>
        <div class="history-list" id="history-list">
            <p class="loading-text">Loading history...</p>
        </div>
    </div>
</div>

<!-- Crisis Modal -->
<div id="crisis-modal" class="crisis-modal">
    <div class="crisis-modal-content">
        <h3>💙 We care about your safety</h3>
        <p id="crisis-message"></p>
        <button onclick="closeCrisisModal()">I Understand</button>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        fetchChatHistory();
    });

    async function fetchChatHistory() {
        let response = await fetch("/history");
        let data = await response.json();
        let historyList = document.getElementById("history-list");
        historyList.innerHTML = "";

        if (Object.keys(data).length === 0) {
            historyList.innerHTML = "<p class='empty-history'>No chat history yet. Start a conversation!</p>";
            return;
        }

        for (let date in data) {
            let historyItem = document.createElement("div");
            historyItem.className = "history-item";
            
            let dateDiv = document.createElement("div");
            dateDiv.className = "history-date";
            dateDiv.textContent = "📅 " + date;
            historyItem.appendChild(dateDiv);

            data[date].forEach(msg => {
                let entryDiv = document.createElement("div");
                entryDiv.className = "history-entry";
                entryDiv.innerHTML = `
                    <div class="history-user"><strong>You (${msg.time}):</strong> ${msg.user_message}</div>
                    <div class="history-bot"><strong>EchoCare (${msg.time}):</strong> ${msg.bot_response}</div>
                `;
                historyItem.appendChild(entryDiv);
            });

            historyList.appendChild(historyItem);
        }
    }

    function toggleHistoryModal() {
        let modal = document.getElementById("history-modal");
        if (modal.style.display === "flex") {
            modal.style.display = "none";
        } else {
            modal.style.display = "flex";
            fetchChatHistory();
        }
    }

    async function sendMessage() {
        let userInput = document.getElementById("user-input");
        let userMessage = userInput.value.trim();
        if (!userMessage) return;

        let chatBox = document.getElementById("chat-box");
        chatBox.innerHTML += `<div class="user-message">🧑 You: ${userMessage}</div>`;
        userInput.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            let response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: userMessage })
            });

            let data = await response.json();

            if (data.is_crisis) {
                document.getElementById("crisis-message").innerText = data.bot_response;
                document.getElementById("crisis-modal").style.display = "flex";
            } else {
                chatBox.innerHTML += `<div class="bot-message">🤖 EchoCare: ${data.bot_response}</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        } catch (error) {
            chatBox.innerHTML += `<div class="bot-message">⚠️ Error connecting. Please try again.</div>`;
        }
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    }

    function closeCrisisModal() {
        document.getElementById("crisis-modal").style.display = "none";
    }

    window.onclick = function(event) {
        let historyModal = document.getElementById("history-modal");
        let crisisModal = document.getElementById("crisis-modal");
        if (event.target === historyModal) {
            historyModal.style.display = "none";
        }
        if (event.target === crisisModal) {
            crisisModal.style.display = "none";
        }
    }
</script>
{% endblock %}
